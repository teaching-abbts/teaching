<!doctype html>
<html>
  <head>
    <title>DOM & JS</title>
    <style>
      strong {
        color: red;
      }
      code {
        background-color: lightgray;
        padding: 2px;
      }
    </style>
  </head>
  <body>
    <p>JavaScript kann den HTML-Inhalt verändern:</p>
    <button type="button" onclick="onClickHandle('button')">Klick mich!</button>
    <button type="button" onclick="onResetHandle()">Zurücksetzen</button>
    <p id="mein-element">...</p>
    <script>
      const myEl = document.getElementById("mein-element");
      function onClickHandle(name) {
        myEl.innerHTML = `👋 Ein Hallo von <strong>JavaScript</strong>, ausgelöst von <code>${name}</code>!`;
      }

      function onResetHandle() {
        myEl.innerHTML = "...";
      }
    </script>
  </body>
</html>
