<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Layout Assignment Solution</title>
    <style>
      html {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: aliceblue;
        display: flex;
        flex-direction: column;
      }

      .header-container {
        display: flex;
        justify-content: center;
        background-color: lightblue;
      }

      header {
        width: 80%;
        display: flex;
        justify-content: space-around;
        padding: 10px;
      }

      .content-container {
        display: flex;
        width: 100%;
        margin: 0;
        flex: 1;
      }

      nav {
        width: 200px;
        background-color: lightgray;
        padding: 10px;
      }

      main {
        width: 100%;
        padding: 20px;
      }

      footer {
        background-color: lightblue;
        display: flex;
        justify-content: space-evenly;
      }

      .teasers {
        width: 100%;
        display: flex;
        justify-content: space-between;
      }

      h2 {
        text-align: center;
      }

      article {
        flex: 1;
        margin: 10px;
        padding: 10px;
        background-color: white;
        border: 1px solid lightgray;
      }
    </style>
  </head>
  <body>
    <div class="header-container">
      <header>
        <button>Home</button>
        <button>Gallery</button>
        <button>Contact</button>
        <button>About</button>
        <button>Blog</button>
      </header>
    </div>
    <div class="content-container">
      <nav>
        <ul>
          <li><a href="#">Link 1</a></li>
          <li><a href="#">Link 2</a></li>
          <li><a href="#">Link 3</a></li>
        </ul>
      </nav>
      <main>
        <h1>Flexbox Layout Assignment Solution</h1>
        <div class="teasers">
          <article>
            <h2>Foo</h2>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
          </article>
          <article>
            <h2>Bar</h2>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
          </article>
        </div>
      </main>
    </div>
    <footer>
      <p>© 2025 Your Company</p>
      <p>Privacy Policy</p>
      <p>Terms of Service</p>
    </footer>
  </body>
</html>
