shamefullyHoist: true

# `playwright-chromium` is needed for `slidev export` (PDF/PNG/PPTX) and has a
# postinstall script that downloads the browser. pnpm v11 errors on unapproved
# build scripts by default (`strictDepBuilds: true`), so allowlist it up-front.
allowBuilds:
  playwright-chromium: true

minimumReleaseAgeExclude:
  - '@iconify/json@2.2.484 || 2.2.485 || 2.2.486 || 2.2.488 || 2.2.491 || 2.2.495'
  - '@vue/compiler-core@3.5.38 || 3.5.39'
  - '@vue/compiler-dom@3.5.38 || 3.5.39'
  - '@vue/compiler-sfc@3.5.38 || 3.5.39'
  - '@vue/compiler-ssr@3.5.38 || 3.5.39'
  - '@vue/reactivity@3.5.38 || 3.5.39'
  - '@vue/runtime-core@3.5.38 || 3.5.39'
  - '@vue/runtime-dom@3.5.38 || 3.5.39'
  - '@vue/server-renderer@3.5.38 || 3.5.39'
  - '@vue/shared@3.5.38 || 3.5.39'
  - vue@3.5.38 || 3.5.39
